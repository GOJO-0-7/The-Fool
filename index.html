<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Wisher 🌙</title>
    <style>
        /* ------------------ CSS STYLES (Looks) ------------------ */
        :root {
            --bg-dark: #020617;
            --bg-card: #0f172a;
            --bg-input: #1e293b;
            --text-main: white;
            --text-muted: #64748b;
            --accent-yellow: #facc15;
            --accent-green: #22c55e;
            --accent-blue: #38bdf8;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Prevent scrolling because of background animation */
        }

        /* ------------------ CANVAS BACKGROUND ------------------ */
        #nightSky {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Place behind the card */
        }

        /* ------------------ MAIN CARD ------------------ */
        .card {
            background-color: var(--bg-card);
            width: 380px;
            max-width: 90%; /* Responsive on small screens */
            height: 420px;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        /* ------------------ UI ELEMENTS ------------------ */
        .title {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-yellow);
            margin-bottom: 20px;
            margin-top: 10px;
        }

        .name-input {
            width: 100%;
            font-size: 16px;
            padding: 12px;
            text-align: center;
            background-color: var(--bg-input);
            color: var(--text-main);
            border: none;
            border-radius: 6px;
            margin-bottom: 15px;
            outline: none;
        }

        .name-input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .generate-btn {
            font-size: 16px;
            font-weight: bold;
            padding: 12px 24px;
            background-color: var(--accent-green);
            color: var(--text-main);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 20px;
        }

        .generate-btn:hover {
            background-color: #1a9e4b; /* Slightly darker green */
        }

        /* ------------------ CHAT BUBBLE ------------------ */
        .bubble {
            background-color: var(--bg-input);
            width: 100%;
            flex-grow: 1; /* Take up remaining space */
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            overflow-y: auto; /* Scroll if text is long */
            display: none; /* Hidden by default */
        }

        .bubble.active {
            display: block;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.5;
            text-align: left;
            word-wrap: break-word; /* wraplength substitute */
        }

        /* ------------------ LINK & FOOTER ------------------ */
        .anonymous-link {
            color: var(--accent-blue);
            font-size: 13px;
            text-decoration: underline;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
            margin-bottom: 5px;
        }

        .footer {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: auto; /* Push to bottom */
            margin-bottom: 5px;
        }

    </style>
</head>
<body>

    <canvas id="nightSky"></canvas>

    <div class="card">
        <div class="title">🌙 Eid Mubarak</div>
        
        <input type="text" id="nameInput" class="name-input" placeholder="Enter your name">
        
        <button id="generateBtn" class="generate-btn">✨ Generate Wish</button>
        
        <div id="messageBubble" class="bubble">
            <p id="messageText" class="message-text"></p>
        </div>
        
        <button class="anonymous-link" onclick="openAnonymousLink()">💌 Send anonymous wish</button>
        
        <div class="footer">Made by Antor 🚀</div>
    </div>

    <script>
        /* ------------------ JAVASCRIPT LOGIC ------------------ */

        // ------------------ DATA ------------------
        const eidMessages = [
            "🌟 Eid Mubarak! May Allah fill your life with joy and your heart with peace. Celebrate every moment with your loved ones.",
            "✨ Wishing you a blessed Eid! May your prayers be accepted and your home be full of happiness.",
            "🎉 May this Eid bring endless happiness to you. Enjoy delicious food and laughter with your family.",
            "🎉 Time for biryani & smiles 😋 Eid Mubarak!",
            "🌙 ঈদ মোবারক! আল্লাহ তোমার জীবন সুখে ভরে দিন।",
            "✨ ঈদের শুভেচ্ছা! তোমার সকল আশা পূরণ হোক।",
            "💫 Eid Mubarak! Spread love and kindness wherever you go. May your good deeds be rewarded abundantly.",
            "✨ May this Eid inspire hope in your heart. Celebrate with gratitude and smiles.",
            "🌟 May this special day bring peace to your soul. Celebrate Eid with joy and harmony.",
            "✨ ঈদ মোবারক! ভালোবাসা, শান্তি এবং আনন্দ তোমার জীবনে বর্ষিত হোক।",
            "💖 Eid Mubarak! May every smile on this day light up your life. Celebrate with full heart and soul.",
            "💫 On this blessed Eid, may Allah accept all your prayers. Celebrate the day with joy and contentment.",
            "🎊 Let the spirit of Eid brighten your heart. Share happiness and make beautiful memories.",
            "✨ Wishing you a bright and joyful Eid! May every prayer you make today be answered."
        ];

        // Optimized name-specific logic (lowercase keys)
        const nameSpecific = {
            "antor": "Don't try my name bro",
            "ayon": "ঈদ মোবারক, Ayon! দ্রুত বিয়ের দাওয়াত চাই। আর ইদে বিয়ের আগে খারাপ কিছু কর না। বিকাশে দ্রুত সালামি পাঠায় দাও।",
            "mim": "ঈদ মোবারক, ডিম। ঈদের দিন দাওয়াত রইল। আর ঈদের পর TREAT টা দিস।",
            "jiasmin": "ঈদ মোবারক SENIOR APUUUUUUUUU! সালামি টা বিকাশে দিয়েন। আর ইদে দাওয়াত রইল।",
            "risalat": "ঈদ মোবারক, Rislook! We should talk more.",
            "raisha": "ঈদ মোবারক, Raisha! We should talk more.",
            "oishy": "Nah, I am not wishing you",
            "sabiha": "No wish for you.",
            "mustak": "ঈদ মুবারক, চাঁদপুরের ইলিশের দাওয়াত কবে পাচ্ছি?",
            "foisal": "ঈদ মোবারক, Foisal! porashuna koto khani shesh korla? amake ektu bujhaiya dio."
        };

        // ------------------ TYPING EFFECT ------------------
        let typingTimeout; // To store timeout ID and prevent overlap

        function typeText(text, element, speed = 25, i = 0) {
            if (i === 0) {
                element.innerHTML = ""; // Clear existing text on start
                clearTimeout(typingTimeout); // Stop any currently running typing
            }

            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                typingTimeout = setTimeout(() => typeText(text, element, speed, i + 1), speed);
            }
        }

        // ------------------ GENERATE WISH FUNCTION ------------------
        const nameInput = document.getElementById('nameInput');
        const generateBtn = document.getElementById('generateBtn');
        const messageBubble = document.getElementById('messageBubble');
        const messageText = document.getElementById('messageText');

        generateBtn.addEventListener('click', showWish);
        // Allow pressing 'Enter' inside input box
        nameInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') showWish();
        });

        function showWish() {
            const name = nameInput.value.trim();

            // Validation (Browser handles placeholder automatically)
            if (name === "") {
                messageBubble.classList.add('active'); // Show bubble
                messageText.style.color = "#f87171"; // Red text for warning
                typeText("⚠️ Please enter your name first!", messageText);
                return;
            }

            // Standard look for message
            messageText.style.color = "white";
            messageBubble.classList.add('active'); // Ensure bubble is visible

            const nameLower = name.toLowerCase();
            let finalText;

            if (nameLower in nameSpecific) {
                finalText = nameSpecific[nameLower];
            } else {
                const randomMsg = eidMessages[Math.floor(Math.random() * eidMessages.length)];
                finalText = `${name}, ${randomMsg}`;
            }

            typeText(finalText, messageText);
        }

        // ------------------ LINK FUNCTION ------------------
        function openAnonymousLink() {
            window.open("https://chithi.me/TheFool", "_blank");
        }

        // ------------------ BACKGROUND ANIMATIONS (Canvas) ------------------
        const canvas = document.getElementById('nightSky');
        const ctx = canvas.getContext('2d');
        let width, height;

        // Resize canvas to fit window
        function setCanvasSize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        setCanvasSize();
        window.addEventListener('resize', setCanvasSize);

        // --- Stars Setup ---
        const stars = [];
        for (let i = 0; i < 50; i++) { // More stars for web version
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height,
                size: Math.random() * 2,
                originalSize: Math.random() * 2
            });
        }

        // --- Moon Setup ---
        const moon = {
            baseX: width * 0.8, // Positioned near top right
            baseY: height * 0.15,
            radius: 25,
            angle: 0
        };

        // --- Main Animation Loop ---
        function animate() {
            // Draw Gradient Background (Replaces Python loop)
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, "#020617"); // Dark top
            gradient.addColorStop(1, "#0f172a"); // Lighter bottom
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // Draw & Animate Stars (Twinkle effect)
            ctx.fillStyle = "white";
            stars.forEach(star => {
                // Slightly vary size randomly to simulate twinkle
                star.size = star.originalSize * (0.8 + Math.random() * 0.4);
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw & Animate Moon (Slight orbital movement)
            moon.angle += 0.01; // Movement speed
            // Match Python trigonometry for movement
            const moonX = moon.baseX + Math.sin(moon.angle) * 10;
            const moonY = moon.baseY + Math.cos(moon.angle) * 5;

            ctx.fillStyle = "#facc15"; // Yellow Moon
            ctx.beginPath();
            ctx.arc(moonX, moonY, moon.radius, 0, Math.PI * 2);
            ctx.fill();

            requestAnimationFrame(animate); // Keep animating
        }

        animate(); // Start animation

    </script>
</body>
</html>
